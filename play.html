<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="play.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏官网 - 游戏玩法</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"微软雅黑",sans-serif;
    }
    body{
      background: #050710;
      color: #e6e2d8;
      line-height:1.8;
    }
    .nav{
      background: #0a0d1b;
      text-align:center;
      padding:18px 0;
      box-shadow: 0 2px 15px #000;
      border-bottom: 1px solid #b8965b;
    }
    .nav a{
      color:#c5bba7;
      text-decoration:none;
      margin:0 25px;
      font-size:16px;
      transition: 0.3s;
      letter-spacing: 1px;
    }
    .nav a.active{
      color:#d4af61;
      border-bottom:2px solid #d4af61;
      padding-bottom:5px;
    }
    .nav a:hover{
      color:#d4af61;
    }

    .container{
      width:90%;
      max-width:1100px;
      margin:50px auto;
    }
    h2{
      color:#d4af61;
      margin-bottom:30px;
      text-align:center;
      letter-spacing: 2px;
    }

    .play-item{
      display:flex;
      align-items:center;
      background: #0c1020;
      padding:25px;
      border-radius:10px;
      margin-bottom:20px;
      gap:25px;
      border: 1px solid #232a40;
      box-shadow: 0 0 15px rgba(184, 150, 91, 0.1);
    }
    .play-item img{
      width:220px;
      height:150px;
      border-radius:8px;
      object-fit:cover;
      border: 1px solid #333a50;
    }
    .play-text{
      flex:1;
    }
    .play-text h3{
      color: #e0c895;
      margin-bottom: 10px;
      font-size: 20px;
    }
    .play-text p{
      color: #c9c2b4;
      font-size: 15px;
    }

    footer{
      background:#04060d;
      text-align:center;
      padding:25px;
      color:#887e6c;
      margin-top:50px;
      border-top: 1px solid #1f253b;
    }
  </style>
</head>
<body>

<div class="nav">
  <a href="index.html">首页</a>
  <a href="role.html">角色介绍</a>
  <a href="play.html" class="active">游戏玩法</a>
</div>

<div class="container">
  <h2>核心玩法系统</h2>

  <div class="play-item">
    <img src="战斗系统.png" alt="战斗系统">
    <div class="play-text">
      <h3>战斗系统</h3>
      <p>流畅连招、技能组合、闪避反击，极致动作体验，操作手感拉满。</p>
    </div>
  </div>

  <div class="play-item">
    <img src="戒世荣光.png" alt="副本挑战">
    <div class="play-text">
      <h3>副本挑战</h3>
      <p>剧情副本、日常副本、世界BOSS，获取大量养成材料与稀有装备。</p>
    </div>
  </div>

  <div class="play-item">
    <img src="角色养成.png" alt="角色养成">
    <div class="play-text">
      <h3>角色养成</h3>
      <p>升级、装备、技能、武器系统，自由培养，打造属于你的最强小队。</p>
    </div>
  </div>
</div>

<footer>© 2025 游戏功能介绍官网 版权所有</footer>
</body>
</html>
